 NWC_metals_in_they_them_hills_mission_desc:0 "The Appalachian Mining Consortium, also known as the AMC, is one of the several rapidly growing corperations in the new world. Freed from the heavy aristocratic control of the mainland economy, in the new world several enterprising burghers have managed to set up combined corperate enteties under the guise of the NKV, with the AMC being the most profitable one. The crown has expressed intrest in funding these new corperations and has promised to keep out the nobility in return for more control and a share of the profits."
