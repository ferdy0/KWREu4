l_spanish:
 nestorian:3 "Nestoriano"
 bon_reformed:3 "Gyur Bön"
 manichean:3 "Maniquea"
 jain:3 "Jain"
 
 manichean_religion_desc:3 "El maniqueísmo es una religión gnóstica que incorpora elementos del cristianismo, el zoroastrismo, el budismo y el gnosticismo."
 jain_religion_desc:3 "El jainismo es una religión muy antigua que procede de la tradición ascética Sramana de la India, en oposición a los brahmanes y al sistema de castas. El principio básico del jainismo es Ahimsa - la no violencia - que se interpreta de un modo más radical que en cualquier otra religión."
 nestorian_religion_desc:3 "El nestorianismo fue una facción de los comienzos del cristianismo que afirma que Cristo tiene dos naturalezas, una divina y una humana. Esta corriente se opone a la monofisita, donde Cristo solo tiene una única naturaleza. La iglesia nestoriana la encabeza el patriarca oriental."
 bon_religion_desc:3 "Bön es la antigua religión prebudista indígena del Tíbet. Es de naturaleza chamanística y animista con múltiples deidades. Tras la introducción del budismo en el Tíbet, el bön adoptó mucho de sus elementos."

# From CK3
 #Christian
 adamites:0 "Adanita"
 adamites_religion_desc:0 "Originalmente una secta cristiana primitiva de la era romana tardía en el norte de África, los adanitas son notoriamente famosos por tratar de restablecer el Paraíso en Tierra caminando desnudos y no responsabilizándose por el bien o el mal."
 adoptianist:0 "Adopcionista"
 adoptianist_religion_desc:0 "La vertiente ibérica del adopcionismo hunde sus raíces en una combinación de pensamiento independiente en el arzobispado de Toledo y sus sedes circundantes, el puritanismo norteafricano de siglos pasados y varios heresiarcas extremadamente carismáticos de principios del siglo IX.\n\nAunque adopta muchas formas, desde las más sutiles a las más contundentes, el punto doctrinal que las une es el cuestionamiento de la divinidad eterna del Hijo."
 insular_celtic:0 "Insular"
 insular_celtic_religion_desc:0 "El cristianismo celta insular es ligeramente diferente del catolicismo, pero no lo suficiente como para que esté representado por las mecánicas del juego además de un nombre elegante."
 bosnian_church:0 "Krstjani"
 bosnian_church_religion_desc:0 "Olvidados durante mucho tiempo tanto por católicos como por ortodoxos, los krstjani de las tierras altas de Bosnia son más permisivos que sus compatriotas más conocidos, pero carecen de estructura formal. Al conservar muchos elementos arcaicos del cristianismo, son tratados a menudo con desdén por sus correligionarios, si es que se les recuerda."

 #Islamic
 masmudi:0 "Masmudi"
 masmudi_religion_desc:0 "Una rama reformista del islam suní surgido entre las tribus bereberes del Norte de África. El movimiento almohade se veía a sí mismo como unitario y predicaba una doctrina de monoteísmo purificado."
 mutazila:0 "Qadariyah"
 mutazila_religion_desc:0 "Una escuela racionalista de teología que afirma que el Corán no coexiste eternamente con Dios, ya que Él habrá precedido a Su palabra."
 quranist:0 "Coranismo"
 quranist_religion_desc:0 "Una interpretación literal del islam que enfatiza que el Corán es la única fuente de sabiduría divina y debe seguirse al pie de la letra, haciendo caso omiso de hadices y fetuas."
 alawite:0 "Alauismo"
 alawite_religion_desc:0 "Las enseñanzas religiosas alauitas son secretas, y el Corán es solo uno de sus textos sagrados. Además de la creencia en la sucesión de imanes a través de Ali, los alauitas también creen en la reencarnación, y que todos los seres son estrellas expulsadas del cielo que ahora deben volver a ganarse su lugar viviendo vidas sucesivas buenas y fieles."

 #Yazidi
 yazidism: "Yazidism"
 harmonized_yazidism:0 "Armonizado con fes yazidi"
 desc_harmonized_yazidism:0 "Hemos incorporado todas las fes yazidis a nuestro país y los valores nacionales."
 meshefaresism:0 "Meshefaresismo"
 meshefaresism_religion_desc:0 "Seguidores del Libro Negro, que describe cómo el Señor descendió de la Montaña Negra para crear el mundo."
 kitebacilweism:0 "Kitêbacilweismo"
 kitebacilweism_religion_desc:0 "Seguidores del Libro de las Revelaciones, que habla de la grandeza de Xwedê."
 HOLY_SITE_411_DESC:0 "Mosul es el hogar de Lalish, un valle de montaña y templo en Ninawa. Es el templo más sagrado de los yazidis. Es la ubicación de la tumba del jeque Adi ibn Musafir, una figura central de la fe yazidi."
 HOLY_SITE_385_DESC:0 "La Meca es famosa por ser el lugar sagrado del Islam. El control de ella por parte de los fieles yazidíes sería una prueba de que es hacia Lalish por lo que debemos orar, no hacia La Meca."
 HOLY_SITE_379_DESC:0 "Como una de las religiones abrahámicas, los yazidíes consideran a Jerusalén como una ciudad sagrada, que debe ser celebrada con el mayor respeto y cuidado."
 HOLY_SITE_4326_DESC:0 "Una de las ciudades más antiguas y prestigiosas del mundo, Nishapur ha sido la capital de más de un gran imperio, exudando prestigio y poder de su núcleo."
 HOLY_SITE_430_DESC:0 "Se dice que fue el lugar del entierro de los 3 magos, Bushehr es importante no solo estratégicamente sino también teológicamente."

 #Mazdan
 zurvanism:0 "Zurvanismo"
 zurvanism_religion_desc:0 "Los zurvanitas creen que Ahura Mazda y Angra Mainyu eran gemelos iguales pero opuestos, nacidos de Zurvan, el Creador de todo. El zurvanismo hace gran hincapié en ayudar a Ahura Mazda mediante arrancando de raíz el mal y las falsedades."
 gayomarthianism:0 "Keyumarismo"
 gayomarthianism_religion_desc:0 "Basándose en la idea de que Ahura Mazda, mediante sus pensamientos, creó los espíritus malignos por accidente, los keyumars rechazan la infalibilidad del Señor de la Sabiduría y, en su lugar, enfatizan la práctica ritual para aprender la verdad en comunión con Ahura Mazda."
 khurramism:0 "Khurramismo"
 khurramism_religion_desc:0 "En un mundo de Luz y Oscuridad, los gobernantes injustos deben ser depuestos en apoyo de lo que es bueno. Mediante profetas como Mazdek, Mahoma y Abu Muslim, los khurramitas creen que la divinidad nació en la humanidad y que un día volverá para guiarles como el Mesías."


 #Gnostic
 gnostic: "Gnosticismo"
 gnostic_religion_desc: "El gnosticismo es una colección de diferentes teorías religiosas, en su mayoría centradas en el dualismo, con la idea de que el mundo material es fruto del Mal."
 harmonized_gnostic:0 "Armonizado con fes gnostic"
 desc_harmonized_gnostic:0 "Hemos incorporado todas las fes gnostics a nuestro país y los valores nacionales."
 mandeaism:0 "Mandeísmo"
 mandeaism_religion_desc:0 "El mandeísmo remonta su linaje a Adán y Juan el Bautista es su mayor profeta. El mundo consta de luz y oscuridad y en su momento, todas las almas mortales serán juzgadas si son dignas de regresar al autor de la luz, el Creador eterno."
 valentinianism:0 "Valentinismo"
 valentinianism_religion_desc:0 "El Padre, el creador original, está al final de todo conocimiento, y el camino a la verdadera comprensión -gnosis. Conseguir el conocimiento mejora el mundo y cuando el mundo haya salido colectivamente de la ignorancia material, regresará a su estado natural y espiritual."
 sethianism:0 "Setianismo"
 sethianism_religion_desc:0 "El Dios Desconocido emanó toda la existencia en el pléroma perfecto, lleno de eones de gracia, el primero de los cuales fue Barbelo, el Madre-Padre.\nUna corrupción causó la existencia de Yaldabaoth, quién robó una porción de divinidad y creó el mundo material. Sin embargo, cuando creó a la humanidad, les dio accidentalmente la chispa de divinidad robada. Yaldabaoth pasará la eternidad intentando recuperar su poder, mientras que la humanidad debe esforzarse por volver a Barbelo y al Dios Desconocido."
 priscillianism:0 "Priscilianismo"
 priscillianism_adherent_plural:0 "priscilianistas"
 cainitism:0 "Cainitismo"
 cainitism_religion_desc:0 "Caín fue la primera víctima del mal del Demiurgo, creador de toda materia física. Como la materia y los cuerpos son malvados, los cuerpos deben ser mancillados y destruidos mediante el pecado para liberar la auténtica alma humana de su interior."

 #Pagan
 kushitism_pagan:1 "Kushitismo"
 kushitism_pagan_religion_desc:0 "Aquí se mantiene fuerte la veneración a los dioses aniguos, así como el venerar el límiete entre vida y muerte."
 kushitism_pagan_reformed:0 "Kushite reformado"
 kushitism_pagan_reformed_religion_desc:0 "La fe kushita revitalizada se remonta a miles de años en los antiguos imperios egipcios."
 magyar_pagan:2 "Urálica"
 magyar_pagan_religion_desc:1 "En la fe mogyer nativa, todo táltos, o sacerdote, es elegido por los dioses antes de su nacimiento. Dotado de una fuerza, sabiduría y poderes sobrehumanos, los urálicos confían a estos táltos la protección de sus comunidades, y esperan que los conduzcan a la prosperidad."
 magyar_pagan_reformed:0 "Uralico reformado"
 magyar_pagan_reformed_religion_desc:0 "Unidos en una creencia común, los que pertenecen a la iglesia Uralica Reformada creen en los Táltos, o sacerdotes, elegidos por los dioses antes de su nacimiento. Dotados de fuerza, sabiduría y poderes sobrehumanos, los Uralics confían a estos Táltos proteger a sus comunidades y llevarlas a la prosperidad."
 siberian_pagan:0 "Turumism"
 siberian_pagan_religion_desc: 0 "Los turistas creen en un mundo horizontal donde los hombres y las bestias viven en clanes, unidos por alianza o venganza. La caza es una parte fundamental del equilibrio entre tomar y dar vida, y con la muerte todas las almas viajan río abajo para reencarnarse en el clan en el que vivían anteriormente."
 siberian_pagan_reformed: 0 "Turumism Reformados"
 siberian_pagan_reformed_religion_desc: 0 "La Iglesia Turumista predica un mundo horizontal donde hombres y bestias viven en clanes, unidos por alianza o venganza. Para los turistas, el equilibrio entre la vida y la muerte es extremadamente importante, y perder una cacería es visto como un gran pecado. Creen que en la muerte todas las almas viajan río abajo para reencarnarse en el clan en el que vivieron anteriormente."

 #Eastern
 harmonized_confucian: 0 "Armonizado con la filosofía confuciana"
 desc_harmonized_confucian: 0 "Hemos incorporado todos los ideales confucianos en nuestro país y el espíritu nacional."
 harmonized_other_eastern: 0 "Armonizado con Eastern"
 desc_harmonized_other_eastern: 0 "Hemos incorporado todas las religiones orientales en nuestro país y la ética nacional."

# From Imperator

 canaanite: "Canaanita"
 canaanite_religion_desc: "La religión cananea venera a varios dioses y sus aspectos, de manera politeísta. Baal es considerado la deidad principal en una compleja jerarquía de dioses menores, que a menudo eran adorados en santuarios que se encuentran en montañas o colinas."
 druidism: "Druidismo"
 druidism_religion_desc: "Los druidas actuaron para los celtas, como una clase social distinta. A menudo actuando como magistrados y legisladores, también dictaban las costumbres y creencias religiosas locales."
 kemetism: "Kemetismo"
 kemetism_religion_desc: "La historia de la religión indígena egipcia se remonta a muchos miles de años. Manifestando como una fe politeísta, la adoración de Ra, Atum, Sekhmet y otros, muestra una profunda reverencia por los aspectos fundamentales del mundo natural."
 mardukism: "Marduquismo"
 mardukism_religion_desc: "La historia del panteón caldeo se remonta a muchos miles de años. Adorando a dioses como Anu, Enki y Nanna, los devotos de la religión caldea construyen imponentes templos en honor a su Dios elegido."
 nuragic_pagan: "Nuragico"
 nuragic_pagan_religion_desc:0 "La nurágica es una creencia que se remonta a la Edad del Bronce de Córcega y Cerdeña. Llena de cultos a animales y pozos, lo más central de la creencia nurágica es la creencia henoteísta en un Dios Padre conocido por muchos nombres, incluidos Sardo, Sid Addir y más." 
 hurrian_pagan: "Hurrita"
 hurrian_pagan_religion_desc:0 "Los hurritas adoraban a un gran número de dioses derivados de diversas culturas del Cercano Oriente. Los principales dioses del panteón hurrita eran Teshub, el poderoso dios del tiempo, y su esposa Hebat, la diosa madre. Una clase especial de figuras veneradas por los hurritas eran las llamadas Sarrena, reyes y héroes deificados."
 
